<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Simple Store</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .admin-form {
            max-width: 600px;
            margin: 2rem auto;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><a href="../index.html">Simple Store</a></div>
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="admin.html" style="font-weight: bold; color: #2980b9;">Admin</a>
            <span id="nav-user" style="display:none;"></span>
            <button id="nav-logout" style="display:none;" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <h1 class="page-title">Admin Dashboard</h1>

        <div class="admin-form">
            <h2>Add New Product</h2>
            <form id="add-product-form" style="margin-top: 1rem;">
                <div class="form-group">
                    <label for="p-name">Product Name</label>
                    <input type="text" id="p-name" required placeholder="e.g. Wireless Mouse">
                </div>
                <div class="form-group">
                    <label for="p-price">Price (₹)</label>
                    <input type="number" id="p-price" step="0.01" required placeholder="e.g. 29.99">
                </div>
                <div class="form-group">
                    <label for="p-desc">Description</label>
                    <input type="text" id="p-desc" required placeholder="Short description of the product">
                </div>
                <div class="form-group">
                    <label for="p-image">Image URL or Filename (Optional)</label>
                    <input type="text" id="p-image" placeholder="e.g. mouse.jpg">
                </div>
                <div class="form-group">
                    <label for="p-stock">Stock Quantity</label>
                    <input type="number" id="p-stock" required value="10" placeholder="e.g. 100">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Save Product to Database</button>
                <div id="admin-message" style="text-align:center; margin-top:1rem; font-weight:bold;"></div>
            </form>
        </div>
    </div>

    <script src="../script.js"></script>
</body>
</html>
